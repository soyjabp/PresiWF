<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <link rel="stylesheet" href="style.css" />
  <title>PokeApp Batalla</title>
</head>
<body>
  <h1>PokeApp: ¡Batalla de Pokémon!</h1>
  <p>*Cada jugador ingresa el nombre o ID de su Pokémon (1 - 1025)*</p>

  <div id="battle-container">
    <div class="player">
      <h3>Jugador 1</h3>
      <input type="text" id="pokemon1" placeholder="Ej: charizard" />
      <div id="result1" class="result"></div>
    </div>

    <div class="vs">VS</div>

    <div class="player">
      <h3>Jugador 2</h3>
      <input type="text" id="pokemon2" placeholder="Ej: blastoise" />
      <div id="result2" class="result"></div>
    </div>
  </div>

  <button onclick="iniciarBatalla()">¡Enfrentar!</button>
  <button onclick="location.reload()">Borrar</button>
  <div id="winner"></div>

  <script src="app.js"></script>
</body>
</html>
